name: Build Custom Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev libxml2-utils bzip2 libbz2-dev libbz2-1.0 squashfs-tools schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc x11proto-core-dev libx11-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
        
    - name: Download Compiler
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git compiler
        
    - name: Download Kernel Source (rsuntk)
      run: |
        git clone --depth=1 -b master https://github.com/rsuntk/android_kernel_asus_sdm660-4.19 kernel
        
    - name: Apply Fast Charging Fix & Install KernelSU
      run: |
        export PATH="$GITHUB_WORKSPACE/compiler/bin:$PATH"
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang

        cd kernel
        
        # 1. FIX FOR AFTERMARKET CHARGING PORT LOOP
        sed -i 's/val = HVDCP_EN_BIT;/val = 0;/g' drivers/power/supply/qcom/smb-lib.c
        sed -i 's/val = HVDCP_AUTH_ALG_EN_CFG_BIT | HVDCP_EN_BIT;/val = 0;/g' drivers/power/supply/qcom/smb-lib.c
        
        # 2. INSTALL ORIGINAL RSUNTK KERNELSU
        curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -
        echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/asus/X00TD_defconfig
        echo "CONFIG_KPROBES=y" >> arch/arm64/configs/vendor/asus/X00TD_defconfig
        
        # 3. COMPILE
        make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- vendor/asus/X00TD_defconfig
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        
    - name: Create Flashable Zip (Failsafe for X00TD)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        sed -i 's/device.name1=.*/device.name1=X00TD/g' AnyKernel3/anykernel.sh
        sed -i 's/device.name2=.*/device.name2=X00T/g' AnyKernel3/anykernel.sh
        sed -i 's|BLOCK=.*;|BLOCK=/dev/block/bootdevice/by-name/boot;|g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=.*/IS_SLOT_DEVICE=0;/g' AnyKernel3/anykernel.sh
        cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        cd AnyKernel3
        zip -r9 ../CustomKernel-X00TD-rsuntk.zip *
        
    - name: Upload Kernel Zip for You
      uses: actions/upload-artifact@v4
      with:
        name: CustomKernel-X00TD-rsuntk
        path: CustomKernel-X00TD-rsuntk.zip
